"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
# add_newline = true

palette = 'gruvbox_dark'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duraton\
$line_break\
$python\
$character"""

[username]
format = "[$user]($style)"
style_root = "color_orange"
style_user = "color_orange"

[hostname]
ssh_symbol = "Ôā¨"
style = "color_orange"

[directory]
format = "[$path]($style)[ $read_only]($read_only_style) "
style = "color_yellow"
read_only_style = "color_red"
read_only = "ůįĆĺ"

[git_branch]
format = "[$branch]($style)"
style = "color_aqua"

[git_state]
style = "color_aqua"

[git_status]
#format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "color_blue"
#conflicted = "‚Äč"
#untracked = "‚Äč"
#modified = "‚Äč"
#staged = "‚Äč"
#renamed = "‚Äč"
#deleted = "‚Äč"
#stashed = "‚Č°"

[cmd_duration]
format = "[$duration]($style) "
style = "color_blue"

#[python]
#format = "[$virtualenv]($style) "
#symbol = "Óīõ"
#style = "color_green"
#detect_extensions = []
#detect_files = []

[character]
disabled = false
success_symbol = '[‚ĚĮ](bold fg:color_green)'
error_symbol = '[‚ĚĮ](bold fg:color_red)'
vimcmd_symbol = '[‚Ěģ](bold fg:color_green)'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'
