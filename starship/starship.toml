"$schema" = 'https://starship.rs/config-schema.json'

palette = 'gruvbox_dark'

format = """
[¯éÂ](color_orange)\
$os\
$username$hostname\
[¯é░](bg:color_yellow fg:color_orange)\
$directory\
[¯é░](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[¯é░](fg:color_aqua bg:color_blue)\
[¯é░](fg:color_blue bg:color_bg3)\
[¯é░](fg:color_bg3 bg:color_bg1)\
[¯é┤ ](fg:color_bg1)\
$line_break$character
"""

[os]
disabled = false
format = "[$symbol ]($style)"
style = "bg:color_orange fg:color_fg0"

[username]
format = '[$user ]($style)'
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"

[hostname]
disabled = false
ssh_symbol = "¯¼ü"
ssh_only = true
format = "[@$hostname]($style)"
style = "bg:color_orange fg:color_fg0"

[directory]
format = "[ $path ]($style)"
style = "fg:color_fg0 bg:color_yellow"
read_only = "¾░î¥"

[git_branch]
format = "[[ $branch ](fg:color_fg0 bg:color_aqua)]($style)"
style = "bg:color_aqua"

[git_status]
#format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
format = "[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)"
style = "bg:color_aqua"

[cmd_duration]
format = '[[ $duration ](fg:color_fg0 bg:color_bg1)]($style)'
style = "bg:color_bg1"

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:color_green)'
error_symbol = '[ÔØ»](bold fg:color_red)'
vimcmd_symbol = '[ÔØ«](bold fg:color_green)'

