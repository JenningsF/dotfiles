"$schema" = 'https://starship.rs/config-schema.json'

palette = 'gruvbox_dark'

format = """
[¯éÂ](color_orange2)\
$os\
$username$hostname\
[¯é░](bg:color_yellow2 fg:color_orange2)\
$directory\
[¯é░](fg:color_yellow2 bg:color_aqua2)\
$git_branch\
$git_status\
[¯é░](fg:color_aqua2 bg:color_blue2)\
[¯é░](fg:color_blue2 bg:color_bg3)\
[¯é░](fg:color_bg3 bg:color_bg1)\
$cmd_duration\
[¯é┤ ](fg:color_bg1)\
$line_break$character
"""

[os]
disabled = false
format = "[$symbol ]($style)"
style = "bg:color_orange2 fg:color_fg0"

[username]
format = '[$user ]($style)'
style_user = "bg:color_orange2 fg:color_fg0"
style_root = "bg:color_orange2 fg:color_fg0"

[hostname]
disabled = false
ssh_symbol = "¯¼ü"
ssh_only = true
format = "[@$hostname]($style)"
style = "bg:color_orange2 fg:color_fg0"

[directory]
format = "[ $path ]($style)"
style = "fg:color_fg0 bg:color_yellow2"
read_only = "¾░î¥"

[git_branch]
format = "[[ $branch ](fg:color_fg0 bg:color_aqua2)]($style)"
style = "bg:color_aqua2"

[git_status]
#format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
format = "[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua2)]($style)"
style = "bg:color_aqua2"

[cmd_duration]
format = '[[ $duration ](fg:color_fg0 bg:color_bg1)]($style)'
style = "bg:color_bg1"

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:color_green2)'
error_symbol = '[ÔØ»](bold fg:color_red2)'
vimcmd_symbol = '[ÔØ«](bold fg:color_green2)'

